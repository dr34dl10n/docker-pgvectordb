# ──────────────────────────────────────────────────────────────────────────────
# pgvectordb — PostgreSQL + pgvector for semantic code search
#
# Quick start:
#   docker compose up -d
#
# Connect:
#   psql -h localhost -U postgres -d codebase
#
# Customise:
#   Copy .env.example to .env and adjust values, or set environment variables.
#   When launched by codebase-skill's deploy.sh --docker, passwords are passed
#   via environment (never hardcoded here for security).
# ──────────────────────────────────────────────────────────────────────────────

services:
  pgvectordb:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Override at build time if needed:
        PG_VERSION: "17"
        PGVECTOR_VERSION: "0.8.0"
    image: pgvectordb:latest
    container_name: pgvectordb
    # ── Environment ───────────────────────────────────────────────────────────
    # Default values for local development / quick start.
    # For production or codebase-skill deployment, deploy.sh --docker passes
    # POSTGRES_PASSWORD via the environment (never uses "postgres" in prod).
    # You can also copy .env.example to .env to customise.
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-codebase}
    # ── Ports ─────────────────────────────────────────────────────────────────
    # Change the host port to avoid conflicts if 5432 is already in use:
    #   "5433:5432"
    ports:
      - "5433:5432"
    # ── Persistence ───────────────────────────────────────────────────────────
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Init scripts run on first container start only
      - ./initdb:/docker-entrypoint-initdb.d:ro
    # ── Health check ──────────────────────────────────────────────────────────
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
    name: pgvectordb_data