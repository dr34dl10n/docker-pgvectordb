# ──────────────────────────────────────────────────────────────────────────────
# CI/CD: Build & push multi-arch Docker image to GHCR
#
# Triggers:
#   - Push to main (tag: latest + version tags)
#   - Pull request to main (build only, no push)
#   - Manual dispatch
#
# Images are published to: ghcr.io/dr34dl10n/pgvectordb
# ──────────────────────────────────────────────────────────────────────────────

name: Build & Push Docker Image

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/pgvectordb
  PG_VERSION: "17"
  PGVECTOR_VERSION: "0.8.0"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # On push to main → latest
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            # On semver tags → pg17-pgvector0.8.0, pg17
            type=raw,value=pg${{ env.PG_VERSION }},enable=${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') }}
            type=raw,value=pg${{ env.PG_VERSION }}-pgvector${{ env.PGVECTOR_VERSION }},enable=${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') }}
            type=semver,pattern={{version}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            PG_VERSION=${{ env.PG_VERSION }}
            PGVECTOR_VERSION=${{ env.PGVECTOR_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max